<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Լրտես 2026</title>
                <style>
                        :root { 
                                    --bg: #23253e; --card: #313559; --card-border: #4F6C8A; 
                                                --primary: #BFB2A0; --terracotta: #B75743; --danger: #94412F; 
                                                            --text-on-dark: #FFFFFF; --subtle-text: #8196A9; 
                                                                    }
                                                                            body { font-family: sans-serif; background-color: var(--bg); color: var(--text-on-dark); text-align: center; padding: 10px; margin: 0; }
                                                                                    .container { max-width: 450px; margin: 15px auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--card-border); }
                                                                                            h1 { font-size: 28px; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
                                                                                                    .setup-group { text-align: left; margin-bottom: 15px; }
                                                                                                            label { font-size: 11px; color: var(--subtle-text); font-weight: bold; display: block; text-transform: uppercase; margin-bottom: 5px; }
                                                                                                                    input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--card-border); background: rgba(0,0,0,0.2); color: white; font-size: 16px; box-sizing: border-box; outline: none; }
                                                                                                                            .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
                                                                                                                                    .player-name-input { flex-grow: 1; }
                                                                                                                                            .remove-x { color: var(--terracotta); font-size: 20px; cursor: pointer; font-weight: bold; padding: 0 5px; }
                                                                                                                                                    .btn-add-player { background: transparent; color: var(--subtle-text); border: 1px dashed var(--card-border); margin-bottom: 20px; padding: 10px; font-size: 14px; cursor: pointer; border-radius: 10px; width: 100%; }
                                                                                                                                                            button.main-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; color: white; }
                                                                                                                                                                    .btn-start { background: var(--terracotta); }
                                                                                                                                                                            .btn-view { background: var(--card-border); font-size: 14px; margin-top: 5px; }
                                                                                                                                                                                    .btn-reset { background: transparent; color: var(--subtle-text); font-size: 11px; text-decoration: underline; margin-top: 25px; cursor: pointer; border: none; }
                                                                                                                                                                                            .hidden { display: none; }
                                                                                                                                                                                                    .role-card { padding: 50px 20px; border-radius: 16px; margin: 30px 0; font-size: 26px; font-weight: bold; }
                                                                                                                                                                                                            .imposter-theme { background: var(--danger); border: 2px solid white; }
                                                                                                                                                                                                                    .civilian-theme { background: var(--primary); color: #1A1A1A; }
                                                                                                                                                                                                                            #viewerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); overflow-y: auto; z-index: 100; padding: 25px; box-sizing: border-box; }
                                                                                                                                                                                                                                    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
                                                                                                                                                                                                                                            .cat-title { color: var(--primary); border-bottom: 1px solid var(--card-border); padding-bottom: 5px; margin-top: 30px; text-align: left; }
                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                <body>

                                                                                                                                                                                                                                                <div class="container" id="menuScreen">
                                                                                                                                                                                                                                                    <h1>ԼՐՏԵՍ</h1>
                                                                                                                                                                                                                                                        <div class="setup-group">
                                                                                                                                                                                                                                                                <label>Խաղացողներ</label>
                                                                                                                                                                                                                                                                        <div id="playerInputsContainer"></div>
                                                                                                                                                                                                                                                                                <button class="btn-add-player" onclick="addPlayerField()">+ Ավելացնել անուն</button>
                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                        <div class="setup-group" style="display:flex; gap:10px;">
                                                                                                                                                                                                                                                                                                <div style="flex:1"><label>Լրտեսներ</label><input type="number" id="imposterCount" value="1" min="1"></div>
                                                                                                                                                                                                                                                                                                        <div style="flex:2"><label>Կատեգորիա</label><select id="categorySelect"></select></div>
                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                <button class="main-btn btn-start" onclick="startGame()">ՍԿՍԵԼ</button>
                                                                                                                                                                                                                                                                                                                    <button class="main-btn btn-view" onclick="toggleViewer(true)">ԴԻՏԵԼ ՑԱՆԿԵՐԸ</button>
                                                                                                                                                                                                                                                                                                                        <button class="btn-reset" onclick="resetData()">Վերակայել ամբողջը</button>
                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                        <div class="container hidden" id="passScreen">
                                                                                                                                                                                                                                                                                                                            <h1 id="playerTurnTitle" style="color:var(--primary)">...</h1>
                                                                                                                                                                                                                                                                                                                                <p style="color:var(--subtle-text)">Վերցրեք հեռախոսը:</p>
                                                                                                                                                                                                                                                                                                                                    <button class="main-btn btn-start" onclick="revealRole()">ՏԵՍՆԵԼ ԴԵՐԸ</button>
                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                    <div class="container hidden" id="roleScreen">
                                                                                                                                                                                                                                                                                                                                        <div class="role-card" id="roleDisplay">...</div>
                                                                                                                                                                                                                                                                                                                                            <button class="main-btn btn-start" onclick="nextPlayer()">ԹԱՔՑՆԵԼ</button>
                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                            <div class="container hidden" id="summaryScreen">
                                                                                                                                                                                                                                                                                                                                                <h1>ԱՐԴՅՈՒՆՔ</h1>
                                                                                                                                                                                                                                                                                                                                                    <div id="summaryList" style="text-align:left; margin-bottom:20px;"></div>
                                                                                                                                                                                                                                                                                                                                                        <button class="main-btn btn-start" onclick="location.reload()">ՆՈՐ ԽԱՂ</button>
                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                        <div id="viewerModal" class="hidden">
                                                                                                                                                                                                                                                                                                                                                            <h2 style="color:var(--primary)">ԲԱԶԱ</h2>
                                                                                                                                                                                                                                                                                                                                                                <div id="viewerContent"></div>
                                                                                                                                                                                                                                                                                                                                                                    <button class="main-btn btn-start" onclick="toggleViewer(false)">ՓԱԿԵԼ</button>
                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                                                                                                                                                                        const defaultData = {
                                                                                                                                                                                                                                                                                                                                                                                "Ուժ": [
                                                                                                                                                                                                                                                                                                                                                                                            "Քաղաքացիական պայմանագիր (ՔՊ)", 
                                                                                                                                                                                                                                                                                                                                                                                                        "Հայաստան դաշինք", 
                                                                                                                                                                                                                                                                                                                                                                                                                    "Պատիվ ունեմ", 
                                                                                                                                                                                                                                                                                                                                                                                                                                "Հայ Յեղափոխական Դաշնակցություն (ՀՅԴ)", 
                                                                                                                                                                                                                                                                                                                                                                                                                                            "Հայաստանի Հանրապետական կուսակցություն (ՀՀԿ)", 
                                                                                                                                                                                                                                                                                                                                                                                                                                                        "Բարգավաճ Հայաստան (ԲՀԿ)", 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    "Լուսավոր Հայաստան (ԼՀԿ)", 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "Ազգային ժողովրդավարական բևեռ (ԱԺԲ)", 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "Հայաստանի կոմունիստական կուսակցություն (ՀԿԿ)", 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "Ապրելու երկիր"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "Գործիչ": ["Նիկոլ Փաշինյան", "Ռոբերտ Քոչարյան", "Սերժ Սարգսյան", "Արարատ Միրզոյան", "Տիգրան Ավինյան", "Բագրատ Սրբազան", "Հայկ Մարության", "Վարդան Ղուկասյան (Դոգ)"],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                "Իրադարձություն": ["Ընտրություններ 2026", "Հանրաքվե", "Սահմանազատում", "Խաղաղության պայմանագիր", "Բողոքի ակցիա"],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        "Վայր": ["Ազգային Ժողով", "Կառավարության շենք", "Հանրապետության Հրապարակ", "Օպերա", "Եռաբլուր", "Բաղրամյան 26"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let categories = JSON.parse(localStorage.getItem('spy_v2026_final')) || defaultData;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let initialNames = ["Արամ", "Անի", "Կարեն", "Մարի"];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let players = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let currentIdx = 0;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function addPlayerField(name = "") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const container = document.getElementById('playerInputsContainer');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const div = document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        div.className = 'player-row';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                div.innerHTML = `<input type="text" class="player-name-input" placeholder="Անուն" value="${name}"><span class="remove-x" onclick="this.parentElement.remove()">✕</span>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        container.appendChild(div);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                initialNames.forEach(n => addPlayerField(n));

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function updateDropdown() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const select = document.getElementById('categorySelect');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    select.innerHTML = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for (let cat in categories) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let opt = document.createElement('option');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    opt.value = cat;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                opt.innerText = `${cat} (${categories[cat].length})`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            select.appendChild(opt);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function toggleViewer(show) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('viewerModal').classList.toggle('hidden', !show);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(show) renderViewer();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function renderViewer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const content = document.getElementById('viewerContent');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    content.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for (let cat in categories) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        content.innerHTML += `<h3 class="cat-title">${cat}</h3>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    categories[cat].forEach((word, index) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    content.innerHTML += `<div class="list-item"><span>${word}</span><span class="remove-x" onclick="deleteWord('${cat}', ${index})">✕</span></div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function deleteWord(cat, index) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        categories[cat].splice(index, 1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(categories[cat].length === 0) delete categories[cat];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        localStorage.setItem('spy_v2026_final', JSON.stringify(categories));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                updateDropdown();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        renderViewer();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function startGame() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const nameList = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n !== "");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const impsCount = parseInt(document.getElementById('imposterCount').value);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const catName = document.getElementById('categorySelect').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (nameList.length < 3 || impsCount >= nameList.length) return alert("Սխալ տվյալներ:");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const secretWord = categories[catName][Math.floor(Math.random() * categories[catName].length)];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                players = nameList.map(name => ({ name: name, role: secretWord }));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let assigned = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                while(assigned < impsCount) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let r = Math.floor(Math.random() * players.length);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(players[r].role !== "ԴՈՒ ԼՐՏԵՍ ԵՍ") { players[r].role = "ԴՈՒ ԼՐՏԵՍ ԵՍ"; assigned++; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        currentIdx = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                showScreen('passScreen');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('playerTurnTitle').innerText = players[currentIdx].name;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function revealRole() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        showScreen('roleScreen');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const display = document.getElementById('roleDisplay');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const role = players[currentIdx].role;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                display.innerText = role;
