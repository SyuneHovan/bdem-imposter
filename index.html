<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Լրտես</title>
                <style>
                        :root { 
                                    --bg: #23253e; --card: #313559; --card-border: #4F6C8A; 
                                                --primary: #BFB2A0; --terracotta: #B75743; --danger: #94412F; 
                                                            --text-on-dark: #FFFFFF; --subtle-text: #8196A9; --success: #2ecc71;
                                                                    }
                                                                            body { font-family: sans-serif; background-color: var(--bg); color: var(--text-on-dark); text-align: center; padding: 10px; margin: 0; }
                                                                                    .container { max-width: 450px; margin: 15px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--card-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
                                                                                            h1 { font-size: 28px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
                                                                                                    .setup-group { text-align: left; margin-bottom: 15px; }
                                                                                                            label { font-size: 11px; color: var(--subtle-text); font-weight: bold; display: block; text-transform: uppercase; margin-bottom: 5px; }
                                                                                                                    input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--card-border); background: rgba(0,0,0,0.2); color: white; font-size: 16px; box-sizing: border-box; outline: none; }
                                                                                                                            .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
                                                                                                                                    .remove-x { color: var(--terracotta); font-size: 20px; cursor: pointer; font-weight: bold; padding: 0 5px; }
                                                                                                                                            button.main-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; margin-top: 10px; }
                                                                                                                                                    .btn-start { background: var(--terracotta); }
                                                                                                                                                            .btn-view { background: var(--card-border); font-size: 14px; }
                                                                                                                                                                    .hidden { display: none; }
                                                                                                                                                                            #viewerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); overflow-y: auto; z-index: 100; padding: 25px; box-sizing: border-box; }
                                                                                                                                                                                    .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
                                                                                                                                                                                            .edit-input { background: #1a1c30; border: 1px solid var(--primary); color: white; padding: 5px; border-radius: 5px; flex-grow: 1; margin-right: 10px; }
                                                                                                                                                                                                    .cat-title { color: var(--primary); border-bottom: 1px solid var(--card-border); padding-bottom: 5px; margin-top: 30px; text-align: left; }
                                                                                                                                                                                                            .btn-mini { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; color: white; margin-left: 5px; }
                                                                                                                                                                                                                    #loading { position: fixed; top: 10px; right: 10px; font-size: 11px; color: var(--success); display: none; }
                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                        <div id="loading">Սինխրոնացում...</div>

                                                                                                                                                                                                                        <div class="container" id="menuScreen">
                                                                                                                                                                                                                            <h1>ԼՐՏԵՍ</h1>
                                                                                                                                                                                                                                
                                                                                                                                                                                                                                    <div class="setup-group">
                                                                                                                                                                                                                                            <label>Խաղացողներ</label>
                                                                                                                                                                                                                                                    <div id="playerInputsContainer"></div>
                                                                                                                                                                                                                                                            <button style="background:transparent; color:var(--subtle-text); border:1px dashed var(--card-border); width:100%; padding:10px; cursor:pointer; border-radius:10px;" onclick="addPlayerField()">+ Ավելացնել անուն</button>
                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                    <div class="setup-group">
                                                                                                                                                                                                                                                                            <label>Կատեգորիա</label>
                                                                                                                                                                                                                                                                                    <select id="categorySelect"></select>
                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                            <button class="main-btn btn-start" onclick="startGame()">ՍԿՍԵԼ ԽԱՂԸ</button>
                                                                                                                                                                                                                                                                                                <button class="main-btn btn-view" onclick="toggleViewer(true)">ԲԱԶԱՅԻ ԿԱՌԱՎԱՐՈՒՄ</button>
                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                                                                                                                                                                                                                                                                                                                <label>Ավելացնել նոր բառ</label>
                                                                                                                                                                                                                                                                                                                        <input type="text" id="newCat" placeholder="Կատեգորիա" style="margin-bottom:8px;">
                                                                                                                                                                                                                                                                                                                                <input type="text" id="newWord" placeholder="Բառ">
                                                                                                                                                                                                                                                                                                                                        <button class="main-btn btn-view" onclick="uploadWord()">ՊԱՀՊԱՆԵԼ</button>
                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                            <div id="viewerModal" class="hidden">
                                                                                                                                                                                                                                                                                                                                                <h2 style="color:var(--primary)">ԽՄԲԱԳՐՈՒՄ</h2>
                                                                                                                                                                                                                                                                                                                                                    <div id="viewerContent"></div>
                                                                                                                                                                                                                                                                                                                                                        <button class="main-btn btn-start" onclick="toggleViewer(false)" style="margin-top:20px;">ՓԱԿԵԼ</button>
                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                        <div class="container hidden" id="passScreen">
                                                                                                                                                                                                                                                                                                                                                            <h1 id="playerTurnTitle" style="color:var(--primary)"></h1>
                                                                                                                                                                                                                                                                                                                                                                <button class="main-btn btn-start" onclick="revealRole()">ՏԵՍՆԵԼ ԴԵՐԸ</button>
                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                <div class="container hidden" id="roleScreen">
                                                                                                                                                                                                                                                                                                                                                                    <div id="roleDisplay" style="padding: 50px 20px; border-radius: 16px; margin: 30px 0; font-size: 26px; font-weight: bold;"></div>
                                                                                                                                                                                                                                                                                                                                                                        <button class="main-btn btn-start" onclick="nextPlayer()">ԹԱՔՑՆԵԼ</button>
                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                            const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
                                                                                                                                                                                                                                                                                                                                                                                const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2eG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";

                                                                                                                                                                                                                                                                                                                                                                                    let rawData = [];
                                                                                                                                                                                                                                                                                                                                                                                        let categories = {};
                                                                                                                                                                                                                                                                                                                                                                                            let editingId = null;

                                                                                                                                                                                                                                                                                                                                                                                                async function fetchWords() {
                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('loading').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                try {
                                                                                                                                                                                                                                                                                                                                                                                                                            const res = await fetch(`${SB_URL}/rest/v1/spy_words?select=*&order=category.asc`, {
                                                                                                                                                                                                                                                                                                                                                                                                                                            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    rawData = await res.json();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                categories = {};
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            rawData.forEach(item => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if(!categories[item.category]) categories[item.category] = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            categories[item.category].push(item.word);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    updateDropdown();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(!document.getElementById('viewerModal').classList.contains('hidden')) renderViewer();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } catch (e) { console.error(e); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('loading').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        async function uploadWord() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const category = document.getElementById('newCat').value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const word = document.getElementById('newWord').value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if(!category || !word) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await fetch(`${SB_URL}/rest/v1/spy_words`, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    method: "POST",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            body: JSON.stringify({ category, word })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('newWord').value = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fetchWords();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            async function updateWord(id, newWord) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('loading').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            await fetch(`${SB_URL}/rest/v1/spy_words?id=eq.${id}`, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        method: "PATCH",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                body: JSON.stringify({ word: newWord })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                editingId = null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fetchWords();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function deleteWord(id) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(!confirm("Հաստատ ջնջե՞լ:")) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('loading').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await fetch(`${SB_URL}/rest/v1/spy_words?id=eq.${id}`, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    method: "DELETE",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fetchWords();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function renderViewer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const content = document.getElementById('viewerContent');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        content.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const groups = {};
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        rawData.forEach(item => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if(!groups[item.category]) groups[item.category] = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                groups[item.category].push(item);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                for (let cat in groups) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            content.innerHTML += `<h3 class="cat-title">${cat}</h3>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        groups[cat].forEach(item => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const isEditing = editingId === item.id;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        content.innerHTML += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="list-item">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ${isEditing ? 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `<input type="text" id="edit-${item.id}" class="edit-input" value="${item.word}">` : 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            `<span onclick="startEdit(${item.id})" style="cursor:pointer; flex-grow:1">${item.word}</span>`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ${isEditing ? 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        `<button class="btn-mini" style="background:var(--success)" onclick="saveEdit(${item.id})">OK</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     <button class="btn-mini" style="background:var(--card-border)" onclick="cancelEdit()">X</button>` : 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 `<button class="btn-mini" style="background:var(--card-border)" onclick="startEdit(${item.id})">✎</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <button class="btn-mini" style="background:var(--terracotta)" onclick="deleteWord(${item.id})">✕</button>`
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
