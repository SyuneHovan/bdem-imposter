<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Լրտես 2026 - Ultimate</title>
    <style>
        :root { 
            --bg: #23253e; --card: #313559; --card-border: #4F6C8A; 
            --primary: #BFB2A0; --terracotta: #B75743; --danger: #94412F; 
            --text-on-dark: #FFFFFF; --subtle-text: #8196A9;
        }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text-on-dark); text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 450px; margin: 15px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--card-border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 26px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        .setup-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 10px; color: var(--subtle-text); font-weight: bold; display: block; text-transform: uppercase; margin-bottom: 5px; }
        
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .player-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; width: 100%; }
        
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--card-border); background: rgba(0,0,0,0.2); color: white; font-size: 15px; outline: none; box-sizing: border-box; }
        
        /* Buttons */
        button.main-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 17px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; transition: 0.2s; }
        .btn-start { background: var(--terracotta); }
        .btn-view { background: transparent; color: var(--subtle-text); border: 1px solid var(--card-border); font-size: 12px; margin-top: 25px; }
        
        /* Minimal Icons */
        .icon-btn { background: none; border: none; color: var(--subtle-text); font-size: 16px; cursor: pointer; padding: 4px 6px; line-height: 1; transition: 0.2s; }
        .icon-btn:hover { color: white; }
        .icon-delete { color: var(--terracotta) !important; font-size: 16px; }
        .icon-accent { color: var(--card-border) !important; }

        /* Admin Modal */
        #viewerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); overflow-y: auto; z-index: 100; padding: 25px; box-sizing: border-box; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-text { flex-grow: 1; text-align: left; cursor: pointer; font-size: 15px; }
        .cat-title { color: var(--primary); border-bottom: 1px solid var(--card-border); padding-bottom: 5px; margin-top: 30px; text-align: left; font-size: 13px; opacity: 0.7; }
        
        .inline-add { display: flex; gap: 8px; margin-top: 8px; padding: 5px 0; }
        .inline-input { background: transparent; border: none; border-bottom: 1px dashed var(--card-border); border-radius: 0; padding: 5px; font-size: 14px; flex-grow: 1; color: white; outline: none; }
        
        .hidden { display: none; }
        #loading { position: fixed; top: 10px; right: 10px; font-size: 9px; color: var(--card-border); display: none; }
    </style>
</head>
<body>

<div id="loading">ՍԻՆՔ...</div>

<div class="container" id="menuScreen">
    <h1>ԼՐՏԵՍ 2026</h1>
    
    <div class="setup-group">
        <label>Խաղացողներ</label>
        <div id="playerInputsContainer"></div>
        <button style="background:transparent; color:var(--subtle-text); border:1px dashed var(--card-border); width:100%; padding:8px; cursor:pointer; border-radius:10px; font-size:11px; margin-top:5px;" onclick="addPlayerField()">+ ԱՎԵԼԱՑՆԵԼ ԱՆՈՒՆ</button>
    </div>

    <div class="setup-group">
        <div class="flex-row">
            <div style="flex: 2;">
                <label>Կատեգորիա</label>
                <select id="categorySelect"></select>
            </div>
            <div style="flex: 1;">
                <label>Լրտեսներ</label>
                <input type="number" id="spyCount" value="1" min="1" max="5">
            </div>
        </div>
    </div>

    <button class="main-btn btn-start" onclick="startGame()">ՍԿՍԵԼ</button>
    <button class="main-btn btn-view" onclick="toggleViewer(true)">ԲԱԶԱՅԻ ԿԱՌԱՎԱՐՈՒՄ</button>
</div>

<div id="viewerModal" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="color:var(--primary); margin:0; font-size: 18px;">ԽՄԲԱԳՐՈՒՄ</h2>
        <button class="icon-btn icon-delete" onclick="toggleViewer(false)" style="font-size: 22px;">✕</button>
    </div>
    <div id="viewerContent"></div>
    <div style="height: 40px;"></div>
</div>

<div class="container hidden" id="passScreen">
    <h1 id="playerTurnTitle" style="color:var(--primary)"></h1>
    <p style="color:var(--subtle-text); font-size: 14px;">Վերցրեք հեռախոսը</p>
    <button class="main-btn btn-start" onclick="revealRole()">ՏԵՍՆԵԼ ԴԵՐԸ</button>
</div>

<div class="container hidden" id="roleScreen">
    <div id="roleDisplay" style="padding: 50px 20px; border-radius: 20px; margin: 25px 0; font-size: 24px; font-weight: bold;"></div>
    <button class="main-btn btn-start" onclick="nextPlayer()">ԹԱՔՑՆԵԼ</button>
</div>

<script>
    const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2eG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";

    let rawData = [];
    let categories = {};
    let players = [];
    let currentIdx = 0;
    let editingId = null;

    async function fetchWords() {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(`${SB_URL}/rest/v1/spy_words?select=*&order=category.asc,word.asc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            rawData = await res.json();
            categories = {};
            rawData.forEach(item => {
                if(!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item.word);
            });
            updateDropdown();
            if(!document.getElementById('viewerModal').classList.contains('hidden')) renderViewer();
        } catch (e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
    }

    async function uploadInline(cat, inputId) {
        const word = document.getElementById(inputId).value.trim();
        if(!word) return;
        document.getElementById('loading').style.display = 'block';
        await fetch(`${SB_URL}/rest/v1/spy_words`, {
            method: "POST",
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({ category: cat, word: word })
        });
        fetchWords();
    }

    async function updateWord(id, newWord) {
        if(!newWord) return;
        document.getElementById('loading').style.display = 'block';
        await fetch(`${SB_URL}/rest/v1/spy_words?id=eq.${id}`, {
            method: "PATCH",
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({ word: newWord })
        });
        editingId = null;
        fetchWords();
    }

    async function deleteWord(id) {
        if(!confirm("Ջնջե՞լ:")) return;
        document.getElementById('loading').style.display = 'block';
        await fetch(`${SB_URL}/rest/v1/spy_words?id=eq.${id}`, {
            method: "DELETE",
            headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Prefer": "return=minimal" }
        });
        fetchWords();
    }

    function renderViewer() {
        const content = document.getElementById('viewerContent');
        content.innerHTML = "";
        const groups = {};
        rawData.forEach(item => {
            if(!groups[item.category]) groups[item.category] = [];
            groups[item.category].push(item);
        });

        for (let cat in groups) {
            content.innerHTML += `<h3 class="cat-title">${cat}</h3>`;
            groups[cat].forEach(item => {
                const isEditing = editingId === item.id;
                content.innerHTML += `
                <div class="list-item">
                    ${isEditing ? 
                        `<input type="text" id="edit-${item.id}" class="inline-input" value="${item.word}" style="border-bottom:1px solid var(--card-border)">` : 
                        `<span class="item-text" onclick="startEdit(${item.id})">${item.word}</span>`
                    }
                    <div style="display:flex;">
                        ${isEditing ? 
                            `<button class="icon-btn icon-accent" onclick="saveEdit(${item.id})">✓</button>
                             <button class="icon-btn" onclick="cancelEdit()">✕</button>` : 
                            `<button class="icon-btn" onclick="startEdit(${item.id})">✎</button>
                             <button class="icon-btn icon-delete" onclick="deleteWord(${item.id})">✕</button>`
                        }
                    </div>
                </div>`;
            });
            content.innerHTML += `
            <div class="inline-add">
                <input type="text" id="add-to-${cat}" class="inline-input" placeholder="+ Ավելացնել...">
                <button class="icon-btn icon-accent" onclick="uploadInline('${cat}', 'add-to-${cat}')">+</button>
            </div>`;
        }
    }

    function startEdit(id) { editingId = id; renderViewer(); }
    function cancelEdit() { editingId = null; renderViewer(); }
    function saveEdit(id) {
        const val = document.getElementById(`edit-${id}`).value.trim();
        updateWord(id, val);
    }

    function updateDropdown() {
        const select = document.getElementById('categorySelect');
        const oldVal = select.value;
        select.innerHTML = '';
        for (let cat in categories) {
            let opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = `${cat} (${categories[cat].length})`;
            select.appendChild(opt);
        }
        if(oldVal && categories[oldVal]) select.value = oldVal;
    }

    function toggleViewer(show) {
        document.getElementById('viewerModal').classList.toggle('hidden', !show);
        if(show) renderViewer();
    }

    function addPlayerField(name = "") {
        const container = document.getElementById('playerInputsContainer');
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="player-name-input" placeholder="Անուն" value="${name}">
                         <button class="icon-btn icon-delete" onclick="this.parentElement.remove()">✕</button>`;
        container.appendChild(div);
    }

    function startGame() {
        const names = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n !== "");
        const cat = document.getElementById('categorySelect').value;
        const spyCount = parseInt(document.getElementById('spyCount').value) || 1;

        if(names.length < 3) return alert("Առնվազն 3 հոգի");
        if(spyCount >= names.length) return alert("Լրտեսները շատ են");

        const secretWord = categories[cat][Math.floor(Math.random() * categories[cat].length)];
        players = names.map(n => ({ name: n, role: secretWord }));

        // Randomly assign spies
        let assignedSpies = 0;
        while(assignedSpies < spyCount) {
            let idx = Math.floor(Math.random() * players.length);
            if(players[idx].role !== "ԴՈՒ ԼՐՏԵՍ ԵՍ") {
                players[idx].role = "ԴՈՒ ԼՐՏԵՍ ԵՍ";
                assignedSpies++;
            }
        }

        currentIdx = 0;
        showScreen('passScreen');
        document.getElementById('playerTurnTitle').innerText = players[0].name;
    }

    function revealRole() {
        showScreen('roleScreen');
        const role = players[currentIdx].role;
        const card = document.getElementById('roleDisplay');
        card.innerText = role;
        card.style.background = role === "ԴՈՒ ԼՐՏԵՍ ԵՍ" ? "var(--danger)" : "var(--primary)";
        card.style.color = role === "ԴՈՒ ԼՐՏԵՍ ԵՍ" ? "white" : "#1a1a1a";
    }

    function nextPlayer() {
        currentIdx++;
        if(currentIdx >= players.length) location.reload();
        else { showScreen('passScreen'); document.getElementById('playerTurnTitle').innerText = players[currentIdx].name; }
    }

    function showScreen(id) {
        ['menuScreen', 'passScreen', 'roleScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    addPlayerField("Արամ"); addPlayerField("Անի"); addPlayerField("Կարեն");
    fetchWords();
</script>
</body>
</html>
