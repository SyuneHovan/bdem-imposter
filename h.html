<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ո՞Վ Է ԴԱՎԱՃԱՆԸ</title>
    <style>
        :root { 
            --bg-dark: #1D2130; 
            --card-dark: #2A2F42; 
            --accent-bordo: #6F3A3A; 
            --accent-terracotta: #CC5A46; 
            --accent-turquoise: #548496; 
            --text-beige: #C2B2A3; 
            --ink-black: #0F121A;
        }

        /* Ֆոնտերի սահմանում */
        @font-face { font-family: 'Montserratarm-Bold'; src: url('./Montserratarm-Bold.otf') format('opentype'); }
        @font-face { font-family: 'Montserratarm-Light'; src: url('./Montserratarm-Light.otf') format('opentype'); }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none; z-index: 9999;
        }

        body {
            font-family: 'Montserratarm-Light', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-beige);
            text-align: center;
            padding: 20px 10px;
            margin: 0;
            letter-spacing: .8px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--card-dark);
            padding: 20px;
            border-radius: 4px;
            border-bottom: 8px solid var(--accent-terracotta);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        h1 {
            font-size: 32px;
            font-family: 'Montserratarm-Bold', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-terracotta);
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 0px var(--ink-black);
        }

        .setup-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 10px; color: var(--accent-turquoise); font-weight: bold; display: block; text-transform: uppercase; margin-bottom: 8px; }

        input, select { 
            width: 100%; padding: 12px; border: 1px solid #444; height: 44px;
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none; box-sizing: border-box;
        }

        button.main-btn { 
            width: 100%; padding: 18px; border: none; font-size: 16px; 
            cursor: pointer; text-transform: uppercase; margin-top: 10px; font-family: 'Montserratarm-Bold', sans-serif;
        }
        .btn-start { background: var(--accent-terracotta); color: white; }
        .btn-view { background: transparent; color: var(--accent-turquoise); border: 1px solid var(--accent-turquoise); font-size: 11px; margin-top: 30px; }
        
        .player-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .player-name-input { flex: 1; }
        
        .small-text { font-size: 7px; letter-spacing: 2px; text-transform:uppercase; color: var(--accent-turquoise); margin-top: 5px; margin-bottom: 30px; }

        .icon-btn { background: none; border: none; color: var(--text-beige); cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .icon-delete { color: #cc5a46 !important; font-size: 18px; }
        .icon-edit { color: var(--accent-turquoise) !important; font-size: 16px; }

        /* Պահոցի Ուղղված Ոճերը */
        #viewerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); overflow-y: auto; z-index: 100; padding: 30px; box-sizing: border-box; }
        
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 0; 
            border-bottom: 1px solid #333; 
            gap: 15px; 
        }
        
        .item-text { text-align: left; flex: 1; word-break: break-word; font-size: 16px; }

        .cat-title { color: var(--accent-terracotta); text-transform: uppercase; font-size: 14px; margin-top: 30px; text-align: left; border-left: 3px solid; padding-left: 10px; }
        
        .add-row { display: flex; gap: 5px; margin-top: 15px; }
        .btn-inline-add { color: var(--accent-turquoise); font-size: 24px; border: none; background: transparent; cursor: pointer; padding: 0 10px; flex-shrink: 0; }
        .btn-add-player { background: transparent; color: var(--text-beige); border: 1px dashed #444; width: 100%; padding: 10px; cursor: pointer; font-size: 11px; margin-top: 5px; }

        .hidden { display: none !important; }
        #loading { position: fixed; top: 10px; left: 10px; font-size: 10px; color: var(--accent-terracotta); z-index: 9999; }

        .role-box { padding: 50px 20px; border: 3px solid var(--accent-terracotta); font-size: 24px; font-weight: bold; margin: 20px 0; font-family: 'Montserratarm-Bold'; text-transform: uppercase; }
        .spy-theme { background: var(--accent-terracotta); color: white; }
        .citizen-theme { background: white; color: var(--ink-black); }
    </style>
</head>
<body>

<div id="loading">ՄԻԱՑՈՒՄ...</div>

<div class="container" id="menuScreen">
    <div class="title-group">
        <h1>Ո՞Վ Է ԴԱՎԱՃԱՆԸ</h1>
        <div class="small-text">գաղտնի տեղեկատվություն // սահմանափակ մուտք</div>
    </div>
    
    <div class="setup-group">
        <label>Գործակալների ցուցակ</label>
        <div id="playerInputsContainer"></div>
        <button class="btn-add-player" onclick="addPlayerField()">+ ԱՎԵԼԱՑՆԵԼ ԱՆՈՒՆ</button>
    </div>

    <div class="setup-group" style="display:flex; gap:10px;">
        <div style="flex:2">
            <label>Կատեգորիա</label>
            <select id="categorySelect"></select>
        </div>
        <div style="flex:1">
            <label>Լրտես</label>
            <input type="number" id="spyCount" value="1" min="1">
        </div>
    </div>

    <button class="main-btn btn-start" onclick="startGame()">ՍԿՍԵԼ ԽԱՂԸ</button>
    <button class="main-btn btn-view" onclick="openAdminPanel()">ՏՎՅԱԼՆԵՐԻ ՊԱՀՈՑ</button>
</div>

<div id="viewerModal" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 id="modalTitle" style="font-size: 18px; color: var(--accent-turquoise); font-family: 'Montserratarm-Bold'; margin: 0;">ՏՎՅԱԼՆԵՐԻ ՊԱՀՈՑ</h2>
        <button class="icon-btn" onclick="toggleViewer(false)" style="font-size: 28px;">✕</button>
    </div>
    <div id="viewerContent"></div>
    <div style="height: 50px;"></div>
</div>

<div class="container hidden" id="passScreen">
    <h2 id="playerTurnTitle" style="color:white; text-transform: uppercase; font-family: 'Montserratarm-Bold';"></h2>
    <p style="color:var(--accent-turquoise)">ՀԵՐԹԸ ՔՈՆՆ Է</p>
    <button class="main-btn btn-start" onclick="revealRole()">ՏԵՍՆԵԼ</button>
</div>

<div class="container hidden" id="roleScreen">
    <div id="roleDisplay" class="role-box"></div>
    <button class="main-btn btn-start" onclick="nextPlayer()">ԹԱՔՑՆԵԼ</button>
</div>

<script>
    const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2eG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";

    let rawData = [];
    let categories = {};
    let players = [];
    let currentIdx = 0;
    let isAdmin = false;

    // --- ՀԻՇՈՂՈՒԹՅՈՒՆ (localStorage) ---
    function savePlayers() {
        const names = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n !== "");
        localStorage.setItem('spy_agents_list', JSON.stringify(names));
    }

    function loadPlayers() {
        const saved = localStorage.getItem('spy_agents_list');
        const container = document.getElementById('playerInputsContainer');
        container.innerHTML = "";
        if (saved) {
            const names = JSON.parse(saved);
            if (names.length > 0) {
                names.forEach(n => addPlayerField(n));
                return;
            }
        }
        addPlayerField("ԱՐԱՄ"); addPlayerField("ԱՆԻ"); addPlayerField("ԿԱՐԵՆ");
    }

    // --- ԲԱԶԱՅԻ ՄԱՍ ---
    async function fetchWords() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(`${SB_URL}/rest/v1/spy_words?select=*&order=category.asc,word.asc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            rawData = await response.json();
            categories = {};
            rawData.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });
            updateDropdown();
            if (!document.getElementById('viewerModal').classList.contains('hidden')) renderViewer();
        } catch (error) { console.error(error); }
        document.getElementById('loading').style.display = 'none';
    }

    function openAdminPanel() {
        const pass = prompt("ԳԱՂՏՆԱԲԱՌ (Ադմինի համար) կամ OK (Դիտելու համար)");
        isAdmin = (pass === "1234");
        toggleViewer(true);
    }

    function renderViewer() {
        const content = document.getElementById('viewerContent');
        document.getElementById('modalTitle').innerText = isAdmin ? "ԱԴՄԻՆԻ ՊԱՀՈՑ" : "ՏՎՅԱԼՆԵՐԻ ՊԱՀՈՑ";
        content.innerHTML = "";

        for (let cat in categories) {
            let catHtml = `<h3 class="cat-title">${cat}</h3>`;
            categories[cat].forEach(item => {
                catHtml += `
                <div class="list-item">
                    <div class="item-text">${item.word}</div>
                    ${isAdmin ? `
                    <div style="display:flex; gap:10px; flex-shrink:0;">
                        <button class="icon-btn icon-edit" onclick="editWord(${item.id}, '${item.word}')">✎</button>
                        <button class="icon-btn icon-delete" onclick="deleteWord(${item.id})">✕</button>
                    </div>` : ""}
                </div>`;
            });
            if(isAdmin) {
                catHtml += `
                <div class="add-row">
                    <input type="text" id="new-word-${cat}" placeholder="Նոր բառ...">
                    <button class="btn-inline-add" onclick="addWord('${cat}')">+</button>
                </div>`;
            }
            content.innerHTML += catHtml;
        }
    }

    async function addWord(category) {
        const word = document.getElementById(`new-word-${category}`).value.trim();
        if (!word) return;
        await fetch(`${SB_URL}/rest/v1/spy_words`, {
            method: 'POST', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({ category, word })
        });
        fetchWords();
    }

    async function deleteWord(id) {
        if (!confirm("Ջնջե՞լ։")) return;
        await fetch(`${SB_URL}/rest/v1/spy_words?id=eq.${id}`, {
            method: 'DELETE', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
        });
        fetchWords();
    }

    async function editWord(id, oldWord) {
        const newWord = prompt("Խմբագրել․", oldWord);
        if (!newWord || newWord.trim() === oldWord) return;
        await fetch(`${SB_URL}/rest/v1/spy_words?id=eq.${id}`, {
            method: 'PATCH', headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({ word: newWord.trim() })
        });
        fetchWords();
    }

    // --- ԽԱՂԻ ՄԱՍ ---
    function addPlayerField(name = "") {
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="player-name-input" placeholder="ԱՆՈՒՆ" value="${name}">
                         <button class="icon-btn icon-delete" onclick="this.parentElement.remove(); savePlayers();">✕</button>`;
        document.getElementById('playerInputsContainer').appendChild(div);
        div.querySelector('input').addEventListener('input', savePlayers);
    }

    function startGame() {
        const names = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n !== "");
        if (names.length < 3) return alert("Ավելացրեք առնվազն 3 գործակալ");
        savePlayers();

        const cat = document.getElementById('categorySelect').value;
        const spyCount = parseInt(document.getElementById('spyCount').value) || 1;
        const secretWord = categories[cat][Math.floor(Math.random() * categories[cat].length)].word;
        
        players = names.map(n => ({ name: n, role: secretWord }));
        let assigned = 0;
        while (assigned < spyCount) {
            let idx = Math.floor(Math.random() * players.length);
            if (players[idx].role !== "ԼՐՏԵՍ") { players[idx].role = "ԼՐՏԵՍ"; assigned++; }
        }
        currentIdx = 0;
        showScreen('passScreen');
        document.getElementById('playerTurnTitle').innerText = players[0].name;
    }

    function revealRole() {
        showScreen('roleScreen');
        const role = players[currentIdx].role;
        const display = document.getElementById('roleDisplay');
        display.innerText = role;
        display.className = "role-box " + (role === "ԼՐՏԵՍ" ? "spy-theme" : "citizen-theme");
    }

    function nextPlayer() {
        currentIdx++;
        if (currentIdx >= players.length) showScreen('menuScreen');
        else {
            showScreen('passScreen');
            document.getElementById('playerTurnTitle').innerText = players[currentIdx].name;
        }
    }

    function toggleViewer(show) {
        document.getElementById('viewerModal').classList.toggle('hidden', !show);
        if (show) renderViewer();
    }

    function updateDropdown() {
        const select = document.getElementById('categorySelect');
        const currentVal = select.value;
        select.innerHTML = '';
        Object.keys(categories).forEach(cat => {
            let opt = document.createElement('option');
            opt.value = opt.innerText = cat;
            select.appendChild(opt);
        });
        if (currentVal && categories[currentVal]) select.value = currentVal;
    }

    function showScreen(id) {
        ['menuScreen', 'passScreen', 'roleScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    loadPlayers();
    fetchWords();
</script>
</body>
</html>
