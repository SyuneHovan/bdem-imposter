<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ԲՈԼՈՐԻՆ ԴԵՄ ԵՄ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #1A1A1A; --card: #1A1A1A; --card-border: #333333; 
            --primary: #FFFFFF; --accent-red: #E31E24; --subtle-gray: #808080;
        }
        
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.06; pointer-events: none; z-index: 9999;
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--primary); text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 420px; margin: 0px auto; background: var(--card); padding: 10px; }
        h1 { font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 30px; border-bottom: 4px solid var(--accent-red); display: inline-block; padding-bottom: 5px; }
        
        .setup-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; color: var(--subtle-gray); font-weight: bold; display: block; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 14px; border-radius: 4px; border: 1px solid #333; 
            background: #262626; color: white; font-size: 16px; outline: none; box-sizing: border-box; 
        }

        button.main-btn { 
            width: 100%; padding: 18px; border-radius: 4px; border: none; 
            font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; 
        }
        .btn-start { background: var(--accent-red); color: white; }
        .btn-outline { background: transparent; border: 1px solid #333; color: var(--subtle-gray); font-size: 11px; }

        .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .icon-btn { background: none; border: none; color: var(--subtle-gray); font-size: 18px; cursor: pointer; }
        
        #viewerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; overflow-y: auto; z-index: 100; padding: 30px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .role-box { padding: 60px 20px; margin: 30px 0; font-size: 28px; font-weight: 900; text-transform: uppercase; }
        .spy-theme { background: var(--accent-red); color: white; }
        .citizen-theme { background: white; color: black; }
    </style>
</head>
<body>

<div id="authScreen" class="container">
    <h1>ԲՈԼՈՐԻՆ <span style="color: var(--accent-red);">ԴԵՄ ԵՄ</span></h1>
    <p style="color: var(--subtle-gray); font-size: 12px; margin-bottom: 40px;">ՄՈՒՏՔ ԳՈՐԾԵՔ ԱԴՄԻՆ ՊԱՆԵԼԻ ՀԱՄԱՐ</p>
    <button class="main-btn btn-start" onclick="loginGoogle()">GOOGLE ՄՈՒՏՔ</button>
    <button class="main-btn btn-outline" style="margin-top: 20px;" onclick="bypassAuth()">ՇԱՐՈՒՆԱԿԵԼ ՈՐՊԵՍ ՀՅՈՒՐ</button>
</div>

<div id="menuScreen" class="container hidden">
    <div style="display:flex; justify-content: space-between; font-size: 10px; margin-bottom: 15px;">
        <span id="userEmail" style="color: var(--accent-red);">GUEST</span>
        <span style="cursor:pointer" onclick="logout()">ԵԼՔ ✕</span>
    </div>
    <h1>ԲՈԼՈՐԻՆ <span style="color: var(--accent-red);">ԴԵՄ ԵՄ</span></h1>
    
    <div class="setup-group">
        <label>Խաղացողներ</label>
        <div id="playerInputsContainer"></div>
        <button class="btn-outline" style="width:100%; padding:10px; border-style:dashed;" onclick="addPlayerField()">+ ԱՎԵԼԱՑՆԵԼ</button>
    </div>

    <div class="setup-group" style="display:flex; gap:10px;">
        <div style="flex:2"><label>Թեմա</label><select id="categorySelect"></select></div>
        <div style="flex:1"><label>Լրտես</label><input type="number" id="spyCount" value="1"></div>
    </div>

    <button class="main-btn btn-start" onclick="startGame()">ՍԿՍԵԼ</button>
    <button id="adminBtn" class="main-btn btn-outline hidden" onclick="toggleViewer(true)">ԱԴՄԻՆ ՊԱՆԵԼ</button>
</div>

<div id="passScreen" class="container hidden">
    <h1 id="playerTurnTitle"></h1>
    <p style="color:var(--subtle-gray)">ՀԵՐԹԸ ՔՈՆՆ Է</p>
    <button class="main-btn btn-start" onclick="revealRole()">ՏԵՍՆԵԼ</button>
</div>

<div id="roleScreen" class="container hidden">
    <div id="roleDisplay" class="role-box"></div>
    <button class="main-btn btn-start" style="background: #333;" onclick="nextPlayer()">ԹԱՔՑՆԵԼ</button>
</div>

<div id="viewerModal" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color:white; margin:0;">ԲԱԶԱՅԻ ԿԱՌԱՎԱՐՈՒՄ</h2>
        <button class="icon-btn" onclick="toggleViewer(false)" style="font-size: 30px; color: var(--accent-red);">✕</button>
    </div>
    <div id="viewerContent"></div>
</div>

<script>
    const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2eG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";
    
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);
    let categories = {};
    let players = [];
    let currentIdx = 0;
    let user = null;

    // --- AUTH LOGIC ---
    async function checkUser() {
        const { data } = await supabase.auth.getUser();
        if (data?.user) {
            user = data.user;
            document.getElementById('userEmail').innerText = user.email.split('@')[0].toUpperCase();
            document.getElementById('adminBtn').classList.remove('hidden');
            showScreen('menuScreen');
        }
    }

    async function loginGoogle() {
        await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin }
        });
    }

    function bypassAuth() {
        showScreen('menuScreen');
    }

    async function logout() {
        await supabase.auth.signOut();
        location.reload();
    }

    // --- GAME LOGIC ---
    async function fetchWords() {
        const { data } = await supabase.from('spy_words').select('*').order('category', {ascending: true});
        if (!data) return;
        
        categories = {};
        data.forEach(item => {
            if(!categories[item.category]) categories[item.category] = [];
            categories[item.category].push(item.word);
        });

        const select = document.getElementById('categorySelect');
        select.innerHTML = Object.keys(categories).map(cat => 
            `<option value="${cat}">${cat.toUpperCase()} (${categories[cat].length})</option>`
        ).join('');
    }

    function addPlayerField(name = "") {
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="p-input" value="${name}" placeholder="ԱՆՈՒՆ">
                         <button class="icon-btn" onclick="this.parentElement.remove()">✕</button>`;
        document.getElementById('playerInputsContainer').appendChild(div);
    }

    function startGame() {
        const names = Array.from(document.querySelectorAll('.p-input')).map(i => i.value.trim()).filter(n => n);
        const cat = document.getElementById('categorySelect').value;
        const spyCount = parseInt(document.getElementById('spyCount').value) || 1;

        if(names.length < 3) return alert("ՄԻՆԻՄՈՒՄ 3 ՀՈԳԻ");
        
        const secretWord = categories[cat][Math.floor(Math.random() * categories[cat].length)];
        players = names.map(n => ({ name: n, role: secretWord }));

        let assignedSpies = 0;
        while(assignedSpies < spyCount) {
            let idx = Math.floor(Math.random() * players.length);
            if(players[idx].role !== "ԼՐՏԵՍ") {
                players[idx].role = "ԼՐՏԵՍ";
                assignedSpies++;
            }
        }

        currentIdx = 0;
        showScreen('passScreen');
        document.getElementById('playerTurnTitle').innerText = players[0].name.toUpperCase();
    }

    function revealRole() {
        showScreen('roleScreen');
        const role = players[currentIdx].role;
        const card = document.getElementById('roleDisplay');
        card.innerText = role;
        card.className = "role-box " + (role === "ԼՐՏԵՍ" ? "spy-theme" : "citizen-theme");
    }

    function nextPlayer() {
        currentIdx++;
        if(currentIdx >= players.length) showScreen('menuScreen');
        else {
            showScreen('passScreen');
            document.getElementById('playerTurnTitle').innerText = players[currentIdx].name.toUpperCase();
        }
    }

    function showScreen(id) {
        ['authScreen', 'menuScreen', 'passScreen', 'roleScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- INITIALIZE ---
    addPlayerField("ԱՐԱՄ"); addPlayerField("ԱՆԻ"); addPlayerField("ԿԱՐԵՆ");
    checkUser();
    fetchWords();

    // Ադմին պանելի բացում/փակում (մնացած ֆունկցիաները թողնում եմ նույնը)
    function toggleViewer(show) { document.getElementById('viewerModal').classList.toggle('hidden', !show); }
</script>

</body>
</html>
