<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ԲՈԼՈՐԻՆ ԴԵՄ ԵՄ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #1A1A1A; --accent-red: #E31E24; --subtle-gray: #808080; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 420px; margin: 0 auto; padding: 10px; }
        h1 { font-size: 28px; font-weight: 900; border-bottom: 4px solid var(--accent-red); display: inline-block; }
        .main-btn { width: 100%; padding: 18px; border-radius: 4px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-outline { background: transparent; border: 1px solid #444; color: var(--subtle-gray); }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 14px; background: #262626; color: white; border: 1px solid #333; margin-top: 5px; box-sizing: border-box; }
        #debug-log { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: #ff5555; font-size: 10px; text-align: left; max-height: 100px; overflow-y: auto; z-index: 10000; padding: 5px; pointer-events: none; }
    </style>
</head>
<body>

<div id="debug-log">Սպասեք... համակարգը միանում է:</div>

<div id="authScreen" class="container">
    <h1>ԲՈԼՈՐԻՆ <span style="color: var(--accent-red);">ԴԵՄ ԵՄ</span></h1>
    <button class="main-btn btn-red" onclick="handleGoogleLogin()">GOOGLE ՄՈՒՏՔ</button>
    <button class="main-btn btn-outline" onclick="showMenu(null)">ՇԱՐՈՒՆԱԿԵԼ ՈՐՊԵՍ ՀՅՈՒՐ</button>
</div>

<div id="menuScreen" class="container hidden">
    <div style="display:flex; justify-content: space-between; font-size: 10px; margin-bottom: 10px;">
        <span id="userTag" style="color: var(--accent-red);">GUEST</span>
        <span onclick="location.reload()">ԵԼՔ ✕</span>
    </div>
    <h1>ՄԵՆՅՈՒ</h1>
    
    <div style="text-align:left; margin-bottom:20px;">
        <label style="font-size:11px; color:var(--subtle-gray)">ԽԱՂԱՑՈՂՆԵՐ</label>
        <div id="pContainer"></div>
        <button class="btn-outline" style="width:100%; padding:8px; border-style:dashed; margin-top:5px;" onclick="addInput()">+ ԱՎԵԼԱՑՆԵԼ</button>
    </div>

    <div style="display:flex; gap:10px; text-align:left;">
        <div style="flex:2"><label style="font-size:11px; color:var(--subtle-gray)">ԹԵՄԱ</label><select id="catSel"></select></div>
        <div style="flex:1"><label style="font-size:11px; color:var(--subtle-gray)">ԼՐՏԵՍ</label><input type="number" id="sCount" value="1"></div>
    </div>

    <button class="main-btn btn-red" onclick="startPlay()">ՍԿՍԵԼ ԽԱՂԸ</button>
</div>

<div id="playScreen" class="container hidden">
    <h1 id="pName" style="color:white;"></h1>
    <p>ՀԵՐԹԸ ՔՈՆՆ Է</p>
    <button class="main-btn btn-red" onclick="reveal()">ՏԵՍՆԵԼ</button>
</div>

<div id="roleScreen" class="container hidden">
    <div id="roleBox" style="padding: 60px 20px; margin: 30px 0; font-size: 28px; font-weight: 900; background: white; color: black;"></div>
    <button class="main-btn" style="background: #333; color: white;" onclick="nextStep()">ԹԱՔՑՆԵԼ</button>
</div>

<script>
    const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2eG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";
    
    let supabase;
    let wordsData = {"Ընդհանուր": ["Մեքենա", "Տուն", "Դպրոց"]};
    let gamePlayers = [];
    let cur = 0;

    function log(msg) { document.getElementById('debug-log').innerText = msg; console.log(msg); }

    // Անմիջապես աշխատող սկրիպտ
    window.onload = async () => {
        try {
            if (typeof window.supabase === 'undefined') { log("Սխալ: Supabase SDK-ն չի բեռնվել:"); return; }
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
            log("Supabase միացված է:");

            // Ստուգում ենք ավտոմատ մուտքը
            const { data: { user } } = await supabase.auth.getUser();
            if (user) showMenu(user);

            // Բեռնում ենք բառերը
            const { data, error } = await supabase.from('spy_words').select('*');
            if (error) log("Բառերի սխալ: " + error.message);
            else if (data && data.length > 0) {
                wordsData = {};
                data.forEach(i => {
                    if(!wordsData[i.category]) wordsData[i.category] = [];
                    wordsData[i.category].push(i.word);
                });
                log("Բազան բեռնվեց: " + data.length + " բառ:");
                updateCats();
            }
        } catch (e) { log("System Error: " + e.message); }
    };

    async function handleGoogleLogin() {
        log("Գնում ենք Google...");
        const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin }
        });
        if (error) log("Login Error: " + error.message);
    }

    function showMenu(u) {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('menuScreen').classList.remove('hidden');
        if (u) document.getElementById('userTag').innerText = u.email.split('@')[0].toUpperCase();
        addInput("ԱՐԱՄ"); addInput("ԱՆԻ"); addInput("ԿԱՐԵՆ");
        updateCats();
    }

    function addInput(v="") {
        const d = document.createElement('div');
        d.style.display = 'flex'; d.style.gap = '5px'; d.style.marginBottom = '5px';
        d.innerHTML = `<input type="text" class="p-in" value="${v}" style="flex:1"><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none;">✕</button>`;
        document.getElementById('pContainer').appendChild(d);
    }

    function updateCats() {
        const s = document.getElementById('catSel');
        s.innerHTML = Object.keys(wordsData).map(k => `<option value="${k}">${k}</option>`).join('');
    }

    function startPlay() {
        const names = Array.from(document.querySelectorAll('.p-in')).map(i => i.value.trim()).filter(n => n);
        if(names.length < 3) return alert("Մինիմում 3 հոգի:");
        
        const cat = document.getElementById('catSel').value;
        const spyCount = parseInt(document.getElementById('sCount').value) || 1;
        const secret = wordsData[cat][Math.floor(Math.random() * wordsData[cat].length)];
        
        gamePlayers = names.map(n => ({ n, r: secret }));
        let s = 0;
        while(s < spyCount) {
            let i = Math.floor(Math.random() * gamePlayers.length);
            if(gamePlayers[i].r !== "ԼՐՏԵՍ") { gamePlayers[i].r = "ԼՐՏԵՍ"; s++; }
        }
        cur = 0;
        showTurn();
    }

    function showTurn() {
        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('roleScreen').classList.add('hidden');
        document.getElementById('playScreen').classList.remove('hidden');
        document.getElementById('pName').innerText = gamePlayers[cur].n.toUpperCase();
    }

    function reveal() {
        document.getElementById('playScreen').classList.add('hidden');
        document.getElementById('roleScreen').classList.remove('hidden');
        const box = document.getElementById('roleBox');
        box.innerText = gamePlayers[cur].r;
        box.style.background = (gamePlayers[cur].r === "ԼՐՏԵՍ") ? "#E31E24" : "white";
        box.style.color = (gamePlayers[cur].r === "ԼՐՏԵՍ") ? "white" : "black";
    }

    function nextStep() {
        cur++;
        if(cur >= gamePlayers.length) location.reload();
        else showTurn();
    }
</script>
</body>
</html>
