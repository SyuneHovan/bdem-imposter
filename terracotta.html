<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ո՞Վ Է ԴԱՎԱՃԱՆԸ</title>
    <style>
        :root { 
            --bg-dark: #1D2130; 
            --card-dark: #2A2F42; 
            --accent-bordo: #6F3A3A; 
            --accent-terracotta: #CC5A46; 
            --accent-turquoise: #548496; 
            --text-beige: #C2B2A3; 
            --ink-black: #0F121A;
        }

        @font-face {
    font-family: 'Montserratarm-Black';
    src: url('./Montserratarm-Black.otf') format('opentype');
        }
        
        @font-face {
    font-family: 'Montserratarm-ExtraBold';
    src: url('./Montserratarm-ExtraBold.otf') format('opentype');
        }

        @font-face {
    font-family: 'Montserratarm-Bold';
    src: url('./Montserratarm-Bold.otf') format('opentype');
        }
        
        @font-face {
    font-family: 'Montserratarm-SemiBold';
    src: url('./Montserratarm-SemiBold.otf') format('opentype');
        }

        @font-face {
    font-family: 'Montserratarm-Medium';
    src: url('./Montserratarm-Medium.otf') format('opentype');
        }
        
        @font-face {
    font-family: 'Montserratarm-Regular';
    src: url('./Montserratarm-Regular.otf') format('opentype');
        }
    
        @font-face {
    font-family: 'Montserratarm-Light';
    src: url('./Montserratarm-Light.otf') format('opentype');
        }

        @font-face {
    font-family: 'Montserratarm-ExtraLight';
    src: url('./Montserratarm-ExtraLight.otf') format('opentype');
        }

        @font-face {
    font-family: 'Montserratarm-Thin';
    src: url('./Montserratarm-Thin.otf') format('opentype');
        }
        

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        body { 
            /*font-family: 'Courier New', Courier, monospace;*/
            font-family: 'Montserratarm-Light', sans-serif;
            background-color: var(--bg-dark); 
            color: var(--text-beige); 
            text-align: center; 
            padding: 20px 10px; 
            margin: 0;
        }

        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: var(--card-dark); 
            padding: 30px; 
            border-radius: 4px; 
            border-bottom: 8px solid var(--accent-terracotta);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        .title-group { margin-bottom: 30px; }
        
        
        h1 { 
            font-size: 32px; 
            font-family: 'Montserratarm-Black', sans-serif;
            text-transform: uppercase; 
            letter-spacing: 3px;
            color: var(--accent-terracotta);
            margin: 0;
            text-shadow: 2px 2px 0px var(--ink-black);
        }

        .setup-group { text-align: left; margin-bottom: 20px; width: auto}
        label { font-size: 10px; color: var(--accent-turquoise); font-weight: bold; display: block; text-transform: uppercase; margin-bottom: 8px; }

        .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .player-name-input { 
            flex: 1; padding: 12px; border: 1px solid #444; 
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none;
        }

        /*select, input[type="number"] { 
            width: calc(100% - 27px); padding: 12px; border: 1px solid #444; 
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none;
        }*/
        
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #444; height: 44px;
            background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none;box-sizing: border-box;
        }

        button.main-btn { 
            width: 100%; padding: 18px; border: none; 
            font-size: 16px; font-family: 'NarekSL', sans-serif; cursor: pointer; text-transform: uppercase;
            margin-top: 10px;
        }
        .btn-start { background: var(--accent-terracotta); color: white; }
        .btn-view { background: transparent; color: var(--accent-turquoise); border: 1px solid var(--accent-turquoise); font-size: 11px; margin-top: 30px; }

        .icon-btn { background: none; border: none; color: var(--text-beige); font-size: 18px; cursor: pointer; }
        .icon-delete { color: var(--accent-bordo) !important; font-size: 22px; }

        #viewerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); overflow-y: auto; z-index: 100; padding: 30px; box-sizing: border-box; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .cat-title { color: var(--accent-terracotta); text-transform: uppercase; font-size: 14px; margin-top: 30px; text-align: left; border-left: 3px solid; padding-left: 10px; }

        .hidden { display: none; }
        #loading { position: fixed; top: 10px; left: 10px; font-size: 10px; color: var(--accent-terracotta); z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">ՄԻԱՑՈՒՄ ԲԱԶԱՅԻՆ...</div>

<div class="container" id="menuScreen">
    <div class="title-group">
        <h1>Ո՞Վ Է ԴԱՎԱՃԱՆԸ</h1>
        <div style="font-size: 9px; text-transform:uppercase; color: var(--accent-turquoise); margin-top: 5px;">գաղտնի տեղեկատվություն // սահմանափակ մուտք</div>
    </div>
    
    <div class="setup-group">
        <label>Գործակալների ցուցակ</label>
        <div id="playerInputsContainer"></div>
        <button style="background:transparent; color:var(--text-beige); border:1px dashed #444; width:100%; padding:10px; cursor:pointer; font-size:11px; margin-top:5px;" onclick="addPlayerField()">+ ԱՎԵԼԱՑՆԵԼ ԱՆՈՒՆ</button>
    </div>

    <div class="setup-group" style="display:flex; gap:10px;">
        <div style="flex:2">
            <label>Կատեգորիա</label>
            <select id="categorySelect"><option>Բեռնում...</option></select>
        </div>
        <div style="flex:1">
            <label>Լրտես</label>
            <input type="number" id="spyCount" value="1" min="1">
        </div>
    </div>

    <button class="main-btn btn-start" onclick="startGame()">ՍԿՍԵԼ ԽԱՂԸ</button>
    <button class="main-btn btn-view" onclick="toggleViewer(true)">ՏՎՅԱԼՆԵՐԻ ԲԱԶԱ</button>
</div>

<div id="viewerModal" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-size: 18px; color: var(--accent-turquoise);">ԱԴՄԻՆ ՊԱՆԵԼ</h2>
        <button class="icon-btn icon-delete" onclick="toggleViewer(false)">✕</button>
    </div>
    <div id="viewerContent"></div>
</div>

<div class="container hidden" id="passScreen">
    <h2 id="playerTurnTitle" style="color:white; text-transform: uppercase;"></h2>
    <p style="color:var(--accent-turquoise)">ՀԵՐԹԸ ՔՈՆՆ Է</p>
    <button class="main-btn btn-start" onclick="revealRole()">ՏԵՍՆԵԼ</button>
</div>

<div class="container hidden" id="roleScreen">
    <div id="roleDisplay" style="padding: 50px 20px; border: 3px solid var(--accent-terracotta); font-size: 24px; font-weight: bold; margin: 20px 0;"></div>
    <button class="main-btn btn-start" style="background: #444;" onclick="nextPlayer()">ԹԱՔՑՆԵԼ</button>
</div>

<script>
    const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2eG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";

    let categories = {};
    let players = [];
    let currentIdx = 0;

    async function fetchWords() {
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        try {
            const response = await fetch(`${SB_URL}/rest/v1/spy_words?select=*`, {
                headers: { 
                    "apikey": SB_KEY, 
                    "Authorization": `Bearer ${SB_KEY}` 
                }
            });
            const data = await response.json();
            
            categories = {};
            data.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item.word);
            });

            updateDropdown();
            loading.style.display = 'none';
        } catch (error) {
            console.error("Սխալ:", error);
            loading.innerText = "ԿԱՊԻ ՍԽԱԼ";
        }
    }

    function updateDropdown() {
        const select = document.getElementById('categorySelect');
        select.innerHTML = '';
        const keys = Object.keys(categories);
        if (keys.length === 0) {
            select.innerHTML = '<option>Դատարկ է</option>';
            return;
        }
        keys.forEach(cat => {
            let opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = cat.toUpperCase();
            select.appendChild(opt);
        });
    }

    function toggleViewer(show) {
        const modal = document.getElementById('viewerModal');
        modal.classList.toggle('hidden', !show);
        if (show) {
            const content = document.getElementById('viewerContent');
            content.innerHTML = "";
            for (let cat in categories) {
                content.innerHTML += `<h3 class="cat-title">${cat}</h3>`;
                categories[cat].forEach(word => {
                    content.innerHTML += `<div class="list-item"><span>${word}</span></div>`;
                });
            }
        }
    }

    function addPlayerField(name = "") {
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="player-name-input" placeholder="ԱՆՈՒՆ" value="${name}">
                         <button class="icon-btn icon-delete" onclick="this.parentElement.remove()">✕</button>`;
        document.getElementById('playerInputsContainer').appendChild(div);
    }

    function startGame() {
        const names = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n !== "");
        const cat = document.getElementById('categorySelect').value;
        const spyCount = parseInt(document.getElementById('spyCount').value) || 1;

        if (names.length < 3 || !categories[cat]) {
            alert("Լրացրեք բոլոր դաշտերը");
            return;
        }

        const secretWord = categories[cat][Math.floor(Math.random() * categories[cat].length)];
        players = names.map(n => ({ name: n, role: secretWord }));

        let assigned = 0;
        while (assigned < spyCount) {
            let idx = Math.floor(Math.random() * players.length);
            if (players[idx].role !== "ԼՐՏԵՍ") {
                players[idx].role = "ԼՐՏԵՍ";
                assigned++;
            }
        }
        currentIdx = 0;
        showScreen('passScreen');
        document.getElementById('playerTurnTitle').innerText = players[0].name;
    }

    function revealRole() {
        showScreen('roleScreen');
        const role = players[currentIdx].role;
        document.getElementById('roleDisplay').innerText = role;
    }

    function nextPlayer() {
        currentIdx++;
        if (currentIdx >= players.length) location.reload();
        else {
            showScreen('passScreen');
            document.getElementById('playerTurnTitle').innerText = players[currentIdx].name;
        }
    }

    function showScreen(id) {
        ['menuScreen', 'passScreen', 'roleScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    addPlayerField("ԱՐԱՄ"); addPlayerField("ԱՆԻ"); addPlayerField("ԿԱՐԵՆ");
    fetchWords();
</script>
</body>
</html>
