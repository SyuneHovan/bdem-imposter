<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ո՞Վ Է ԴԱՎԱՃԱՆԸ</title>
    <style>
        :root { 
            --dark-bg: #1D2130; /* Palette-ի ամենամուգ կապույտը */
            --accent-terracotta: #CC5A46; /* Palette-ի տեռակոտան */
            --accent-turquoise: #548496; /* Palette-ի փիրուզագույնը */
            --text-beige: #C2B2A3; /* Palette-ի բաց բեժը */
            --ink-black: #0F121A;
        }

        /* ԱՂՄՈՒԿԻ ԷՖԵԿՏ */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.08;
            pointer-events: none;
            z-index: 9999;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--dark-bg); 
            color: var(--text-beige); 
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Վերնագիր */
        header {
            margin-top: 40px;
            margin-bottom: 50px;
            text-align: center;
        }

        h1 { 
            font-size: 32px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            color: var(--accent-terracotta);
            margin: 0;
            text-shadow: 2px 2px 0px var(--ink-black);
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent-turquoise);
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Հիմնական բլոկ */
        .content-area { 
            width: 100%;
            max-width: 500px;
            flex-grow: 1;
        }

        .setup-group { text-align: left; margin-bottom: 25px; }
        label { font-size: 11px; color: var(--accent-turquoise); font-weight: bold; display: block; text-transform: uppercase; margin-bottom: 10px; }

        /* Ինփութներ */
        .player-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .player-name-input { 
            flex: 1; padding: 15px; border: 1px solid #332b2b; 
            background: #110d0d; color: var(--text-beige); font-size: 16px; outline: none; border-radius: 0;
        }
        .player-name-input:focus { border-color: var(--accent-terracotta); }

        input[type="number"], select { 
            width: 100%; padding: 15px; border: 1px solid #332b2b; 
            background: #110d0d; color: var(--text-beige); font-size: 16px; outline: none; border-radius: 0;
            appearance: none;
        }

        /* Կոճակներ */
        button.main-btn { 
            width: 100%; padding: 20px; border: none; 
            font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; margin-top: 15px; border-radius: 0;
            letter-spacing: 1px;
        }
        .btn-start { background: var(--accent-terracotta); color: white; box-shadow: 0 5px 15px rgba(183, 87, 67, 0.2); }
        .btn-start:active { transform: scale(0.98); }
        
        .btn-view { background: transparent; color: var(--accent-turquoise); border: 1px solid #332b2b; font-size: 11px; margin-top: 40px; }

        .icon-btn { background: none; border: none; color: var(--accent-terracotta); font-size: 24px; cursor: pointer; padding: 0 5px; }

        /* Modal / Full Screens */
        .full-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 1000; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #2a2222; }
        .cat-title { color: var(--accent-terracotta); text-transform: uppercase; font-size: 14px; margin-top: 40px; text-align: left; border-left: 3px solid var(--accent-terracotta); padding-left: 10px; }

        /* Դերերի ցուցադրում */
        .role-text { font-size: 35px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .role-label { font-size: 12px; color: var(--accent-turquoise); margin-bottom: 20px; }

        .hidden { display: none; }
        #loading { position: fixed; bottom: 20px; right: 20px; font-size: 10px; color: var(--accent-terracotta); letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="loading">ՈՐՈՆՈՒՄ...</div>

<header id="mainHeader">
    <h1>Ո՞Վ Է ԴԱՎԱՃԱՆԸ</h1>
    <div class="subtitle">գաղտնի տեղեկատվություն // սահմանափակ մուտք</div>
</header>

<div class="content-area" id="menuScreen">
    <div class="setup-group">
        <label>Գործակալների ցուցակ</label>
        <div id="playerInputsContainer"></div>
        <button style="background:transparent; color:var(--text-beige); border:1px dashed #443a3a; width:100%; padding:12px; cursor:pointer; font-size:11px; margin-top:10px;" onclick="addPlayerField()">+ Ավելացնել նոր անուն</button>
    </div>

    <div class="setup-group" style="display:flex; gap:15px;">
        <div style="flex:2">
            <label>Օպերացիայի վայրը</label>
            <select id="categorySelect"></select>
        </div>
        <div style="flex:1">
            <label>Լրտեսներ</label>
            <input type="number" id="spyCount" value="1" min="1">
        </div>
    </div>

    <button class="main-btn btn-start" onclick="startGame()">Սկսել գործողությունը</button>
    <button class="main-btn btn-view" onclick="toggleViewer(true)">📁 Մուտք տվյալների բազա</button>
</div>

<div id="viewerModal" class="full-overlay hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="color:var(--text-beige); margin:0; font-size: 18px;">ՏՎՅԱԼՆԵՐԻ_ԲԱԶԱ</h2>
        <button class="icon-btn" onclick="toggleViewer(false)">✕</button>
    </div>
    <div id="viewerContent"></div>
</div>

<div id="passScreen" class="full-overlay hidden">
    <div style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h2 id="playerTurnTitle" style="font-size: 40px; color: var(--text-beige); margin-bottom: 10px;"></h2>
        <div style="color: var(--accent-terracotta); margin-bottom: 40px;">ՍՊԱՍՈՒՄ Է ՀՐԱՀԱՆԳԻ...</div>
        <button class="main-btn btn-start" onclick="revealRole()">Բացել</button>
    </div>
</div>

<div id="roleScreen" class="full-overlay hidden">
    <div style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div class="role-label">ՔՈ ԴԵՐՆ Է՝</div>
        <div id="roleDisplay" class="role-text"></div>
        <div style="margin-top: 60px; width: 100%; max-width: 300px;">
            <button class="main-btn" style="background: #222; color: var(--text-beige);" onclick="nextPlayer()">Հասկացա</button>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2eG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";

    let rawData = [];
    let categories = {};
    let players = [];
    let currentIdx = 0;
    let editingId = null;

    async function fetchWords() {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(`${SB_URL}/rest/v1/spy_words?select=*&order=category.asc,word.asc`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            rawData = await res.json();
            categories = {};
            rawData.forEach(item => {
                if(!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item.word);
            });
            updateDropdown();
        } catch (e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
    }

    function updateDropdown() {
        const select = document.getElementById('categorySelect');
        select.innerHTML = '';
        for (let cat in categories) {
            let opt = document.createElement('option');
            opt.value = cat;
            opt.innerText = cat.toUpperCase();
            select.appendChild(opt);
        }
    }

    function addPlayerField(name = "") {
        const container = document.getElementById('playerInputsContainer');
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="player-name-input" placeholder="ԱՆՈՒՆ" value="${name}">
                         <button class="icon-btn" onclick="this.parentElement.remove()">✕</button>`;
        container.appendChild(div);
    }

    function startGame() {
        const names = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n !== "");
        const cat = document.getElementById('categorySelect').value;
        const spyCount = parseInt(document.getElementById('spyCount').value) || 1;

        if(names.length < 3) return alert("ԳՈՐԾԱԿԱԼՆԵՐԸ ՔԻՉ ԵՆ");
        const secretWord = categories[cat][Math.floor(Math.random() * categories[cat].length)];
        players = names.map(n => ({ name: n, role: secretWord }));

        let assignedSpies = 0;
        while(assignedSpies < spyCount) {
            let idx = Math.floor(Math.random() * players.length);
            if(players[idx].role !== "ԼՐՏԵՍ") {
                players[idx].role = "ԼՐՏԵՍ";
                assignedSpies++;
            }
        }

        currentIdx = 0;
        document.getElementById('mainHeader').classList.add('hidden');
        showScreen('passScreen');
        document.getElementById('playerTurnTitle').innerText = players[0].name.toUpperCase();
    }

    function revealRole() {
        showScreen('roleScreen');
        const role = players[currentIdx].role;
        const disp = document.getElementById('roleDisplay');
        disp.innerText = role;
        disp.style.color = (role === "ԼՐՏԵՍ") ? "var(--accent-terracotta)" : "var(--text-beige)";
    }

    function nextPlayer() {
        currentIdx++;
        if(currentIdx >= players.length) location.reload();
        else { 
            showScreen('passScreen'); 
            document.getElementById('playerTurnTitle').innerText = players[currentIdx].name.toUpperCase(); 
        }
    }

    function toggleViewer(show) {
        document.getElementById('viewerModal').classList.toggle('hidden', !show);
        if(show) {
            const content = document.getElementById('viewerContent');
            content.innerHTML = "";
            for (let cat in categories) {
                content.innerHTML += `<h3 class="cat-title">${cat}</h3>`;
                categories[cat].forEach(word => {
                    content.innerHTML += `<div class="list-item"><span>${word}</span></div>`;
                });
            }
        }
    }

    function showScreen(id) {
        ['menuScreen', 'passScreen', 'roleScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // Initial setup
    addPlayerField("ԳՈՐԾԱԿԱԼ 1"); addPlayerField("ԳՈՐԾԱԿԱԼ 2"); addPlayerField("ԳՈՐԾԱԿԱԼ 3");
    fetchWords();
</script>
</body>
</html>
