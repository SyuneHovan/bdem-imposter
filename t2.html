<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ո՞Վ Է ԴԱՎԱՃԱՆԸ // AGENT TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-dark: #1D2130; --card-dark: #2A2F42; 
            --accent-bordo: #6F3A3A; --accent-terracotta: #CC5A46; 
            --accent-turquoise: #548496; --text-beige: #C2B2A3; --ink-black: #0F121A;
        }

        @font-face { font-family: 'Montserratarm-Bold'; src: url('./Montserratarm-Bold.otf') format('opentype'); }
        @font-face { font-family: 'Montserratarm-Light'; src: url('./Montserratarm-Light.otf') format('opentype'); }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none; z-index: 9999;
        }

        body { font-family: 'Montserratarm-Light', sans-serif; background-color: var(--bg-dark); color: var(--text-beige); text-align: center; padding: 20px 10px; margin: 0; letter-spacing: .8px; }
        .container { max-width: 400px; margin: 0 auto; background: var(--card-dark); padding: 20px; border-radius: 4px; border-bottom: 8px solid var(--accent-terracotta); box-shadow: 0 20px 50px rgba(0,0,0,0.3); position: relative; }
        
        h1 { font-size: 32px; font-family: 'Montserratarm-Bold', sans-serif; text-transform: uppercase; letter-spacing: 3px; color: var(--accent-terracotta); margin: 0; text-shadow: 2px 2px 0px var(--ink-black); margin-bottom: 10px; }
        .small-text { font-size: 7px; letter-spacing: 2px; text-transform:uppercase; color: var(--accent-turquoise); margin-bottom: 30px; }

        input, select { width: 100%; padding: 12px; border: 1px solid #444; height: 44px; background: rgba(0,0,0,0.3); color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        button.main-btn { width: 100%; padding: 18px; border: none; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-family: 'Montserratarm-Bold'; transition: 0.2s; }
        .btn-start { background: var(--accent-terracotta); color: white; }
        .btn-view { background: transparent; color: var(--accent-turquoise); border: 1px solid var(--accent-turquoise); font-size: 11px; margin-top: 30px; }
        .btn-outline { background: transparent; border: 1px solid #444; color: var(--text-beige); font-size: 11px; }

        .player-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .icon-btn { background: none; border: none; color: var(--text-beige); font-size: 16px; cursor: pointer; opacity: 0.7; }
        .icon-delete { color: var(--accent-terracotta) !important; }

        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        #viewerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); overflow-y: auto; z-index: 100; padding: 30px; box-sizing: border-box; }
        .hidden { display: none; }
        #loading { position: fixed; top: 10px; left: 10px; font-size: 10px; color: var(--accent-terracotta); z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">ՄԻԱՑՈՒՄ...</div>

<div id="authOverlay">
    <div class="container">
        <h1 style="font-size: 22px;">ԳՈՐԾԱԿԱԼՈՒԹՅՈՒՆ</h1>
        <div class="small-text">Identification Required</div>
        
        <button class="main-btn" style="background: white; color: #1D2130; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="loginWithGoogle()">
            <img src="https://www.google.com/favicon.ico" width="18"> ՄՈՒՏՔ GOOGLE-ՈՎ
        </button>

        <div style="margin: 20px 0; color: #444; font-size: 10px;">ԿԱՄ</div>

        <button class="main-btn btn-outline" style="width: 100%; border-color: var(--accent-turquoise);" onclick="continueAsGuest()">
            ՇԱՐՈՒՆԱԿԵԼ ՈՐՊԵՍ ՀՅՈՒՐ
        </button>
    </div>
</div>

<div id="mainUI" class="hidden">
    <div class="container" id="menuScreen">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span id="userDisplay" style="font-size: 9px; color: var(--accent-turquoise);"></span>
            <button class="icon-btn" onclick="logout()" style="font-size: 10px;">ԵԼՔ ✕</button>
        </div>
        
        <h1>Ո՞Վ Է ԴԱՎԱՃԱՆԸ</h1>
        <div class="small-text">գաղտնի տեղեկատվություն // սահմանափակ մուտք</div>
        
        <div style="text-align: left; margin-bottom: 20px;">
            <label style="font-size: 10px; color: var(--accent-turquoise); font-weight: bold; text-transform: uppercase;">Գործակալներ</label>
            <div id="playerInputsContainer" style="margin-top: 10px;"></div>
            <button class="btn-outline" style="width: 100%; border-style: dashed; padding: 10px; margin-top: 5px;" onclick="addPlayerField()">+ ԱՎԵԼԱՑՆԵԼ ԱՆՈՒՆ</button>
        </div>

        <div style="display:flex; gap:10px; text-align: left; margin-bottom: 20px;">
            <div style="flex:2">
                <label style="font-size: 10px; color: var(--accent-turquoise); text-transform: uppercase;">Կատեգորիա</label>
                <select id="categorySelect"></select>
            </div>
            <div style="flex:1">
                <label style="font-size: 10px; color: var(--accent-turquoise); text-transform: uppercase;">Լրտես</label>
                <input type="number" id="spyCount" value="1" min="1">
            </div>
        </div>

        <button class="main-btn btn-start" onclick="startGame()">ՍԿՍԵԼ ԽԱՂԸ</button>
        <button id="adminBtn" class="main-btn btn-view hidden" onclick="toggleViewer(true)">ՏՎՅԱԼՆԵՐԻ ՊԱՀՈՑ</button>
    </div>
</div>

<div id="viewerModal" class="hidden">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="font-size: 18px; color: var(--accent-turquoise); font-family: 'Montserratarm-Bold';">ՏՎՅԱԼՆԵՐԻ ՊԱՀՈՑ</h2>
        <button class="icon-btn" onclick="toggleViewer(false)" style="font-size: 24px;">✕</button>
    </div>
    <div id="viewerContent"></div>
</div>

<div class="container hidden" id="passScreen">
    <h2 id="playerTurnTitle" style="color:white; text-transform: uppercase; font-family: 'Montserratarm-Bold';"></h2>
    <p style="color:var(--accent-turquoise)">ՀԵՐԹԸ ՔՈՆՆ Է</p>
    <button class="main-btn btn-start" onclick="revealRole()">ՏԵՍՆԵԼ</button>
</div>

<div class="container hidden" id="roleScreen">
    <div id="roleDisplay" style="padding: 50px 20px; border: 3px solid var(--accent-terracotta); font-size: 24px; font-weight: bold; margin: 20px 0; font-family: 'Montserratarm-Bold'; color: white;"></div>
    <button class="main-btn btn-start" onclick="nextPlayer()">ԹԱՔՑՆԵԼ</button>
</div>

<script>
    const SB_URL = "https://svxmabbzipfdsjaeuoei.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2xG1hYmJ6aXBmZHNqYWV1b2VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzU1NjgsImV4cCI6MjA4OTUxMTU2OH0.Sz7y07tOj2IDK224LoQ7XpdpyFtdnM4GUtv9adgHqbU";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let categories = {};
    let players = [];
    let currentIdx = 0;

    // --- AUTHENTICATION ---
    async function loginWithGoogle() {
        const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin }
        });
        if (error) alert(error.message);
    }

    function continueAsGuest() {
        currentUser = null;
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('mainUI').classList.remove('hidden');
        document.getElementById('userDisplay').innerText = "GUEST MODE";
        loadUserPlayers();
        fetchWords();
    }

    async function logout() { await supabase.auth.signOut(); location.reload(); }

    async function checkSession() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = user;
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainUI').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = user.email.toUpperCase();
            
            const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', user.id).single();
            if (profile?.is_admin) document.getElementById('adminBtn').classList.remove('hidden');

            loadUserPlayers();
            fetchWords();
        } else {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // --- PLAYER MANAGEMENT ---
    async function loadUserPlayers() {
        const container = document.getElementById('playerInputsContainer');
        container.innerHTML = "";

        if (currentUser) {
            const { data } = await supabase.from('user_players').select('name').order('created_at', { ascending: true });
            if (data && data.length > 0) {
                data.forEach(p => addPlayerField(p.name, false));
                return;
            }
        } else {
            const saved = localStorage.getItem('guest_players');
            if (saved) {
                JSON.parse(saved).forEach(n => addPlayerField(n, false));
                return;
            }
        }
        ["ԱՐԱՄ", "ԱՆԻ", "ԿԱՐԵՆ"].forEach(n => addPlayerField(n, false));
    }

    async function syncPlayers() {
        const names = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n);
        if (currentUser) {
            await supabase.from('user_players').delete().eq('user_id', currentUser.id);
            if (names.length > 0) {
                await supabase.from('user_players').insert(names.map(n => ({ name: n, user_id: currentUser.id })));
            }
        } else {
            localStorage.setItem('guest_players', JSON.stringify(names));
        }
    }

    function addPlayerField(name = "", shouldSync = true) {
        const div = document.createElement('div');
        div.className = 'player-row';
        div.innerHTML = `<input type="text" class="player-name-input" placeholder="Անուն" value="${name}" onchange="syncPlayers()">
                         <button class="icon-btn icon-delete" onclick="this.parentElement.remove(); syncPlayers();">✕</button>`;
        document.getElementById('playerInputsContainer').appendChild(div);
        if (shouldSync) syncPlayers();
    }

    // --- WORD DATABASE ---
    async function fetchWords() {
        document.getElementById('loading').style.display = 'block';
        const { data } = await supabase.from('spy_words').select('*').order('category', { ascending: true });
        categories = {};
        data.forEach(item => {
            if (!categories[item.category]) categories[item.category] = [];
            categories[item.category].push(item);
        });
        updateDropdown();
        document.getElementById('loading').style.display = 'none';
    }

    function updateDropdown() {
        const select = document.getElementById('categorySelect');
        select.innerHTML = "";
        Object.keys(categories).forEach(cat => {
            let opt = document.createElement('option');
            opt.value = opt.innerText = cat;
            select.appendChild(opt);
        });
    }

    function toggleViewer(show) {
        document.getElementById('viewerModal').classList.toggle('hidden', !show);
        if (show) renderViewer();
    }

    function renderViewer() {
        const content = document.getElementById('viewerContent');
        content.innerHTML = "";
        for (let cat in categories) {
            let html = `<h3 style="color:var(--accent-terracotta); text-align:left; font-size:14px; margin-top:20px; border-left:3px solid; padding-left:10px;">${cat.toUpperCase()}</h3>`;
            categories[cat].forEach(item => {
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #333;">
                            <span>${item.word}</span>
                            <button class="icon-btn" style="color:var(--accent-terracotta)" onclick="deleteWord(${item.id})">✕</button>
                         </div>`;
            });
            content.innerHTML += html;
        }
    }

    async function deleteWord(id) {
        if (!confirm("Ջնջե՞լ")) return;
        await supabase.from('spy_words').delete().eq('id', id);
        fetchWords();
    }

    // --- GAME ENGINE ---
    function startGame() {
        const names = Array.from(document.querySelectorAll('.player-name-input')).map(i => i.value.trim()).filter(n => n);
        const cat = document.getElementById('categorySelect').value;
        const spyCount = parseInt(document.getElementById('spyCount').value) || 1;
        if (names.length < 3) return alert("Առնվազն 3 հոգի");

        const wordList = categories[cat];
        const secretWord = wordList[Math.floor(Math.random() * wordList.length)].word;
        players = names.map(n => ({ name: n, role: secretWord }));

        let s = 0;
        while (s < spyCount) {
            let idx = Math.floor(Math.random() * players.length);
            if (players[idx].role !== "ԼՐՏԵՍ") { players[idx].role = "ԼՐՏԵՍ"; s++; }
        }
        currentIdx = 0;
        showScreen('passScreen');
        document.getElementById('playerTurnTitle').innerText = players[0].name;
    }

    function revealRole() {
        showScreen('roleScreen');
        document.getElementById('roleDisplay').innerText = players[currentIdx].role;
    }

    function nextPlayer() {
        currentIdx++;
        if (currentIdx >= players.length) showScreen('menuScreen');
        else {
            showScreen('passScreen');
            document.getElementById('playerTurnTitle').innerText = players[currentIdx].name;
        }
    }

    function showScreen(id) {
        ['menuScreen', 'passScreen', 'roleScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    checkSession();
</script>
</body>
</html>
